    <title>Noor Al Maqdis Hardware</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; }
            });
          }
        } catch (e) {
          console.warn('window.fetch polyfill setter bypass failed:', e);
        }
      })();
    </script>
